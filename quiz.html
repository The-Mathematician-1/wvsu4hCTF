<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Powershell Commands Quiz</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  text-align: center;
  padding: 20px;
}

.container {
  max-width: 600px;
  margin: auto;
  background: #1e293b;
  padding: 20px;
  border-radius: 10px;
}

button {
  display: block;
  margin: 10px auto;
  padding: 10px 20px;
  border: none;
  border-radius: 5px;
  background: #22c55e;
  color: black;
  cursor: pointer;
}

button:hover {
  background: #16a34a;
}

input {
  padding: 10px;
  border-radius: 5px;
  border: none;
  margin: 10px;
}

.feedback {
  margin-top: 10px;
  font-weight: bold;
}
</style>
</head>
<body>

<div class="container" id="app">
  <h1>💻 Powershell Quiz</h1>
  <div id="start">
    <p>Enter your team name:</p>
    <input type="text" id="name" placeholder="Your team name">
    <button onclick="startQuiz()">Start Quiz</button>
  </div>
</div>

<script>
const quiz = [
  { q: "Which command lists files?", a: shuffle(["Get-ChildItem", "New-Item", "New-Item -ItemType Directory", "Remove-Item"]), correct: "Get-ChildItem" },
{ q: "Which command creates a file?", a: shuffle(["New-Item", "Copy-Item", "Move-Item", "Get-ChildItem"]), correct: "New-Item" },
{ q: "Which command creates a folder?", a: shuffle(["New-Item -ItemType Directory", "Remove-Item", "Get-ChildItem", "Write-Output"]), correct: "New-Item -ItemType Directory" },
{ q: "Which command deletes a file?", a: shuffle(["Remove-Item", "Copy-Item", "Move-Item", "New-Item"]), correct: "Remove-Item" },
{ q: "Which command copies a file?", a: shuffle(["Copy-Item", "Move-Item", "Remove-Item", "Get-ChildItem"]), correct: "Copy-Item" },
{ q: "Which command moves or renames a file?", a: shuffle(["Move-Item", "Copy-Item", "Get-ChildItem", "Write-Output"]), correct: "Move-Item" },
{ q: "Which command prints text?", a: shuffle(["Write-Output", "Get-ChildItem", "Remove-Item", "New-Item"]), correct: "Write-Output" },
{ q: "Which command generates random numbers?", a: shuffle(["Get-Random", "Get-ChildItem", "New-Item", "Copy-Item"]), correct: "Get-Random" },
{ q: "Which command clears the screen?", a: shuffle(["Clear", "Remove-Item", "Get-ChildItem", "Move-Item"]), correct: "Clear" },
{ q: "Which command searches for patterns in strings?", a: shuffle(["Select-String", "Get-ChildItem", "Write-Output", "New-Item"]), correct: "Select-String" }
];

// shuffle function to randomize options
function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

let current = 0;
let score = 0;
let playerName = "";

function startQuiz() {
  const nameInput = document.getElementById("name").value.trim();
  if (!nameInput) {
    alert("Please enter your team name!");
    return;
  }
  playerName = nameInput;
  loadQuestion();
}

function loadQuestion() {
  const app = document.getElementById("app");

  if (current >= quiz.length) {
  app.innerHTML = `
    <h1>🎉 Finished!</h1>
    <h2>${playerName}, Your Score: ${score}/10</h2>
    <h3>😎 Congratulations, you are now a hacker!</h3>
    <p style="color:#4ade80; font-weight:bold; margin-top:15px;">
      Flag: wvsuCTF{quiz_master_achieved}
    </p>
  `;
  return;
}

  app.innerHTML = `
    <h2>${quiz[current].q}</h2>
    <div id="answers"></div>
    <p>Score: ${score}</p>
    <p class="feedback" id="feedback"></p>
  `;

  const answersDiv = document.getElementById("answers");

  quiz[current].a.forEach(ans => {
    const btn = document.createElement("button");
    btn.innerText = ans;
    btn.onclick = () => checkAnswer(ans);
    answersDiv.appendChild(btn);
  });
}

function checkAnswer(ans) {
  const feedback = document.getElementById("feedback");

  if (ans === quiz[current].correct) {
    score++;
    feedback.innerText = "✅ Correct!";
    setTimeout(() => {
      current++;
      loadQuestion();
    }, 800);
  } else {
    feedback.innerText = "❌ Wrong! Try again.";
  }
}
</script>

</body>
</html>
